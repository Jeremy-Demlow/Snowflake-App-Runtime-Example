definition_version: "2"

# Environments live at the APP layer, not the data layer. The data database is
# fixed (one read-only copy). What changes per environment is only the app
# object's SCHEMA and a NAME SUFFIX, so dev / feature-branch / prod instances
# stay fully isolated (own service, own URL, own build workspace):
#   * local / default        -> APPS_DEV, suffix _DEV
#   * ephemeral feature branch -> APPS_DEV, suffix _<BRANCH> (set by CI)
#   * production             -> APPS,     suffix "" (set by CI)
# CI overrides via snow's native --env templating (no file edits / no sed):
#   snow app deploy --env app_schema=APPS --env app_suffix=
env:
  app_schema: APPS_DEV
  app_suffix: _DEV

entities:
  ski_resort_dashboard:
    type: snowflake-app
    identifier:
      name: SKI_RESORT_DASHBOARD<% ctx.env.app_suffix %>
      database: SKI_RESORT_DEMO
      schema: <% ctx.env.app_schema %>
    artifacts:
      - src: ./*
        dest: ./
        ignore:
          - node_modules
          - .localdev
          - .env*
          - __pycache__
          - "*.pyc"
          - .next
          - .git
          - snowflake.log

    query_warehouse: SKI_DEMO_WH
    build_compute_pool:
      name: SYSTEM_COMPUTE_POOL_CPU
    service_compute_pool:
      name: SYSTEM_COMPUTE_POOL_CPU
    code_workspace: SKI_RESORT_DEMO.<% ctx.env.app_schema %>.SNOWFLAKE_APPS<% ctx.env.app_suffix %>
