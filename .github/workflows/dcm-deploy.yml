name: Deploy Governance (DCM)

# Manages the single governance project SKI_RESORT_DEMO.PUBLIC.SKI_GOVERNANCE
# (roles, warehouse, APPS/APPS_DEV schemas, grants). Triggers:
#   pull_request (governance/** changed) -> PLAN only, posted to the PR summary
#   push to main (governance/** changed) -> PLAN + DEPLOY to target MAIN
#   workflow_dispatch                    -> PLAN + optional DEPLOY
#
# One job: the setup runs once, the plan step always runs, and the deploy step
# is gated by event. `environment` resolves to `production` (approval-gated) for
# deploy events and `dev` (no gate) for plan-only PRs.
#
# Connection: DCM needs the nested SNOWFLAKE_CONNECTIONS_DEFAULT_* env shape
# (bare SNOWFLAKE_AUTHENTICATOR is NOT honored by `snow dcm create`, and `snow
# dcm` does not support the `-x` temporary connection). We write an empty
# [default] connections.toml stub; the env vars populate every field.
#
# DCM creates ACCOUNT-level objects (roles + warehouse), so it connects as
# ACCOUNTADMIN and uses COMPUTE_WH (SKI_DEMO_WH may not exist yet on first run).
# Post-deployment grants (governance/post_deployment_grants.sql) remain a
# documented one-time manual step (FUTURE/SEMANTIC/account grants).
on:
  pull_request:
    branches: [main]
    paths:
      - 'governance/**'
  push:
    branches: [main]
    paths:
      - 'governance/**'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Plan only (no deploy)'
        required: false
        default: true
        type: boolean

concurrency:
  group: dcm-governance
  cancel-in-progress: false

env:
  SNOWFLAKE_CONNECTIONS_DEFAULT_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_CONNECTIONS_DEFAULT_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_CONNECTIONS_DEFAULT_ROLE: ACCOUNTADMIN
  SNOWFLAKE_CONNECTIONS_DEFAULT_WAREHOUSE: COMPUTE_WH
  SNOWFLAKE_CONNECTIONS_DEFAULT_AUTHENTICATOR: SNOWFLAKE_JWT
  SNOWFLAKE_CONNECTIONS_DEFAULT_PRIVATE_KEY_FILE: /tmp/snowflake_key.p8

jobs:
  dcm:
    runs-on: ubuntu-latest
    # Deploy events hit the approval-gated `production` environment; plan-only
    # PRs use `dev` (no protection) so the plan posts to the summary immediately.
    environment: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.plan_only == false)) && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: snowflakedb/snowflake-cli-action@v2
        with:
          cli-version: "3.20"

      - name: Write key + connection stub
        run: |
          umask 077
          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}" > /tmp/snowflake_key.p8
          mkdir -p ~/.snowflake
          printf '[default]\n' > ~/.snowflake/connections.toml
          chmod 600 ~/.snowflake/connections.toml /tmp/snowflake_key.p8

      - name: Connection sanity
        run: snow connection test -c default

      - name: DCM plan (MAIN)
        working-directory: governance
        run: |
          set -euo pipefail
          snow dcm create --if-not-exists --target MAIN -c default
          snow dcm plan --target MAIN -c default | tee /tmp/dcm_plan.txt
          {
            echo "### DCM Plan (target MAIN)"
            echo ""
            echo '```'
            cat /tmp/dcm_plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: DCM deploy (MAIN)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.plan_only == false)
        working-directory: governance
        run: |
          set -euo pipefail
          snow dcm deploy --target MAIN -c default | tee /tmp/dcm_deploy.txt
          {
            echo "### DCM Deploy (target MAIN)"
            echo ""
            echo '```'
            cat /tmp/dcm_deploy.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/snowflake_key.p8 ~/.snowflake/connections.toml
