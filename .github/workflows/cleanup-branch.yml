name: Cleanup ephemeral branch apps

# When a PR to main closes (merged or abandoned), remove every discovered app's
# throwaway copy from APPS_DEV so dev objects don't pile up. Mirrors the
# discovery + slug rules in deploy-dev.yml.
on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch whose ephemeral apps to remove"
        required: true

concurrency:
  group: cleanup-${{ github.head_ref || github.event.inputs.branch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      suffix: ${{ steps.slug.outputs.suffix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Discover apps under apps/*
        id: discover
        run: |
          set -euo pipefail
          rows=""
          for d in apps/*/; do
            name="$(basename "$d")"
            case "$name" in _*) continue;; esac
            yml="apps/${name}/snowflake.yml"
            [ -f "$yml" ] || continue
            if grep -qE '^[[:space:]]*type:[[:space:]]*snowflake-app' "$yml"; then
              type="snowflake-app"
            elif grep -qE '^[[:space:]]*type:[[:space:]]*streamlit' "$yml"; then
              type="streamlit"
            else
              continue
            fi
            rows="${rows}$(printf '{"name":"%s","dir":"apps/%s","type":"%s"}' "$name" "$name" "$type")"$'\n'
          done
          matrix="$(printf '%s' "$rows" | grep -v '^$' | jq -sc '{include: .}')"
          count="$(printf '%s' "$rows" | grep -vc '^$' || true)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Compute branch suffix
        id: slug
        run: |
          RAW="${{ github.head_ref || github.event.inputs.branch }}"
          SLUG=$(echo "$RAW" | tr '[:lower:]' '[:upper:]' | tr -c 'A-Z0-9' '_' | sed 's/_\+/_/g; s/^_//; s/_$//' | cut -c1-24)
          echo "suffix=_${SLUG}" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: prepare
    if: ${{ needs.prepare.outputs.count != '0' }}
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.PRIVATE_KEY_PASSPHRASE }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Snowflake CLI
        uses: ./.github/actions/snowflake-cli
        with:
          private-key-raw: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}

      - name: Remove ${{ matrix.name }} (${{ matrix.type }}) from APPS_DEV
        working-directory: ${{ matrix.dir }}
        env:
          SUFFIX: ${{ needs.prepare.outputs.suffix }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.type }}" = "snowflake-app" ]; then
            snow app teardown --force -x --env app_schema=APPS_DEV --env "app_suffix=${SUFFIX}" \
              || echo "Next.js app already gone."
          else
            # Resolve the streamlit object base name from snowflake.yml (strip the template tag).
            base="$(grep -A6 'type:[[:space:]]*streamlit' snowflake.yml | grep -m1 'name:' | sed -E 's/.*name:[[:space:]]*//; s/<%.*%>//' | tr -d '[:space:]')"
            snow sql -x -q "DROP STREAMLIT IF EXISTS ${SNOWFLAKE_DATABASE}.APPS_DEV.${base}${SUFFIX}"
          fi

      - name: Cleanup key
        if: always()
        run: rm -f /tmp/snowflake_key.p8
