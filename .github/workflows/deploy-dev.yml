name: Deploy Apps to DEV (ephemeral feature branch)

# Every feature branch (anything except main) and every PR gets its OWN throwaway
# copy of both dashboards in the APPS_DEV schema, named with a sanitized branch
# slug. They are torn down automatically when the PR closes (see
# cleanup-branch.yml). PROD is handled by deploy-prod.yml behind an approval gate.
#
# SCOPE: app deployment only. DCM governance (roles, warehouse, APPS / APPS_DEV
# schemas, grants) is ONE-TIME setup — run it once with:
#   snow dcm deploy SKI_RESORT_DEMO.PUBLIC.SKI_GOVERNANCE --target MAIN
# This workflow assumes the data and governance already exist.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-dev-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-apps:
    runs-on: ubuntu-latest
    env:
      # Key-pair auth via a temporary connection (no config.toml needed).
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.PRIVATE_KEY_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: snowflakedb/snowflake-cli-action@v2
        with:
          cli-version: "3.20"

      # Derive a Snowflake-identifier-safe suffix from the branch name, e.g.
      # "feature/new-chart" -> "_FEATURE_NEW_CHART" (uppercased, non-alnum -> _,
      # truncated so the full object name stays within identifier limits).
      - name: Compute branch suffix
        id: slug
        run: |
          RAW="${{ github.head_ref || github.ref_name }}"
          SLUG=$(echo "$RAW" | tr '[:lower:]' '[:upper:]' | tr -c 'A-Z0-9' '_' | sed 's/_\+/_/g; s/^_//; s/_$//' | cut -c1-24)
          echo "suffix=_${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Branch '$RAW' -> app suffix '_${SLUG}'"

      # Deploy to APPS_DEV with the per-branch suffix.
      - name: Deploy Next.js dashboard (App Runtime / SPCS)
        working-directory: apps/nextjs-dashboard
        run: snow app deploy -x --env app_schema=APPS_DEV --env app_suffix=${{ steps.slug.outputs.suffix }}

      - name: Deploy Streamlit dashboard
        working-directory: apps/streamlit-dashboard
        run: snow streamlit deploy --replace --prune -x --env app_schema=APPS_DEV --env app_suffix=${{ steps.slug.outputs.suffix }}

      - name: Summary
        run: |
          echo "### Ephemeral DEV apps deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Schema: \`SKI_RESORT_DEMO.APPS_DEV\`  •  Suffix: \`${{ steps.slug.outputs.suffix }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Next.js: \`SKI_RESORT_DASHBOARD${{ steps.slug.outputs.suffix }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Streamlit: \`SKI_RESORT_STREAMLIT${{ steps.slug.outputs.suffix }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "These are removed automatically when the PR closes." >> "$GITHUB_STEP_SUMMARY"
