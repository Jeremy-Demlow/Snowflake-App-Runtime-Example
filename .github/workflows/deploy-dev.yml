name: Deploy Apps to DEV (ephemeral, per branch)

# Auto-discovers every app under apps/* (skipping names starting with "_", e.g.
# apps/_template) and deploys each to the APPS_DEV schema with a per-branch name
# suffix. Adding apps/<your-app>/ requires NO change to this workflow.
#
# PROD is deploy-prod.yml (approval-gated). Ephemeral apps are removed when the
# PR closes (cleanup-branch.yml). DCM governance is dcm-deploy.yml.
#
# Auth: repo SECRETS for credentials, repo VARIABLES (unmasked) for role/wh/db.
on:
  push:
    branches-ignore:
      - main
    paths:
      - 'apps/**'
      - '!apps/_template/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/**'
      - '!apps/_template/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-dev-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---- Discover apps + compute the branch suffix --------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      suffix: ${{ steps.slug.outputs.suffix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Discover apps under apps/*
        id: discover
        run: |
          set -euo pipefail
          rows=""
          for d in apps/*/; do
            name="$(basename "$d")"
            case "$name" in _*) echo "skip $name (template)"; continue;; esac
            yml="apps/${name}/snowflake.yml"
            [ -f "$yml" ] || { echo "skip $name (no snowflake.yml)"; continue; }
            if grep -qE '^[[:space:]]*type:[[:space:]]*snowflake-app' "$yml"; then
              type="snowflake-app"
            elif grep -qE '^[[:space:]]*type:[[:space:]]*streamlit' "$yml"; then
              type="streamlit"
            else
              echo "skip $name (unknown entity type)"; continue
            fi
            rows="${rows}$(printf '{"name":"%s","dir":"apps/%s","type":"%s"}' "$name" "$name" "$type")"$'\n'
          done
          matrix="$(printf '%s' "$rows" | grep -v '^$' | jq -sc '{include: .}')"
          count="$(printf '%s' "$rows" | grep -vc '^$' || true)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count app(s): $matrix"

      # "feature/new-chart" -> "_FEATURE_NEW_CHART" (uppercase, non-alnum -> _,
      # squeeze/trim _, max 24 chars). Must match cleanup-branch.yml + teardown.sh.
      - name: Compute branch suffix
        id: slug
        run: |
          RAW="${{ github.head_ref || github.ref_name }}"
          SLUG=$(echo "$RAW" | tr '[:lower:]' '[:upper:]' | tr -c 'A-Z0-9' '_' | sed 's/_\+/_/g; s/^_//; s/_$//' | cut -c1-24)
          echo "suffix=_${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Branch '$RAW' -> suffix '_${SLUG}'"

  # ---- Deploy each discovered app to APPS_DEV -----------------------------
  deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.count != '0' }}
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.PRIVATE_KEY_PASSPHRASE }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Snowflake CLI
        uses: ./.github/actions/snowflake-cli
        with:
          private-key-raw: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}

      - name: Deploy ${{ matrix.name }} (${{ matrix.type }}) to APPS_DEV
        working-directory: ${{ matrix.dir }}
        env:
          SUFFIX: ${{ needs.prepare.outputs.suffix }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.type }}" = "snowflake-app" ]; then
            snow app deploy -x --env app_schema=APPS_DEV --env "app_suffix=${SUFFIX}"
          else
            snow streamlit deploy --replace --prune -x --env app_schema=APPS_DEV --env "app_suffix=${SUFFIX}"
          fi

      - name: Summary
        if: always()
        env:
          SUFFIX: ${{ needs.prepare.outputs.suffix }}
        run: |
          echo "### ${{ matrix.name }} -> APPS_DEV" >> "$GITHUB_STEP_SUMMARY"
          echo "Type: \`${{ matrix.type }}\`  •  Object suffix: \`${SUFFIX}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Removed automatically when the PR closes." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup key
        if: always()
        run: rm -f /tmp/snowflake_key.p8
